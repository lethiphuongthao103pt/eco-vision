<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THCS Nguyễn Trãi - Eco Vision AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
    <style>
        :root { --primary-green: #2e7d32; --light-green: #e8f5e9; --accent-green: #4caf50; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f0f4f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone-frame { width: 360px; height: 740px; background: white; border: 12px solid #333; border-radius: 40px; position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; padding: 20px; box-sizing: border-box; text-align: center; }
        .screen.active { display: flex; }

        /* Màn hình 1: Trang chủ */
        #home-screen { background: linear-gradient(180deg, #ffffff 0%, #e8f5e9 100%); }
        .logo-school { width: 60px; margin-top: 20px; }
        .hero-img { width: 80%; margin: 30px auto; }
        .btn-main { background: var(--accent-green); color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3); }

        /* Màn hình 2: Quét */
        #webcam-container { width: 100%; border-radius: 20px; border: 4px dashed var(--accent-green); margin-top: 50px; overflow: hidden; background: #000; height: 300px; }
        .scan-line { width: 100%; height: 2px; background: red; position: absolute; top: 30%; left: 0; animation: moveLine 2s infinite linear; }
        @keyframes moveLine { 0% { top: 20%; } 100% { top: 60%; } }

        /* Màn hình 3: Kết quả */
        .result-card { background: white; border-radius: 20px; padding: 20px; margin-top: 30px; border: 2px solid var(--light-green); text-align: left; }
        .carbon-tag { background: #ff5252; color: white; padding: 5px 15px; border-radius: 10px; font-weight: bold; }
        .eco-tip { background: #fffde7; border-left: 5px solid #fbc02d; padding: 10px; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div id="home-screen" class="screen active">
        <img src="https://via.placeholder.com/60?text=Logo" class="logo-school" alt="THCS Nguyễn Trãi">
        <h2 style="color: var(--primary-green);">ECO-VISION</h2>
        <p>"Quét để hiểu - Sống xanh hơn!"</p>
        <img src="https://via.placeholder.com/200x200?text=Earth+AI" class="hero-img">
        <button class="btn-main" onclick="showScreen('scan-screen'); initAI();">📷 BẮT ĐẦU QUÉT</button>
    </div>

    <div id="scan-screen" class="screen">
        <h3>MÀN HÌNH QUÉT</h3>
        <div style="position: relative;">
            <div id="webcam-container"></div>
            <div class="scan-line"></div>
        </div>
        <p>Đưa sản phẩm vào khung hình</p>
        <button onclick="showScreen('home-screen')" style="margin-top:auto; padding:10px; border:none; background:none; color:gray;">← Quay lại</button>
    </div>

    <div id="result-screen" class="screen">
        <h3 style="color: #1976d2;">KẾT QUẢ PHÂN TÍCH</h3>
        <div class="result-card">
            <h2 id="res-name">Tên sản phẩm</h2>
            <p>Carbon: <span id="res-carbon" class="carbon-tag">CAO</span></p>
            <div class="eco-tip">
                <b>Eco-tip:</b> <span id="res-tip">Đang phân tích...</span>
            </div>
        </div>
        <button class="btn-main" style="margin-top: 30px;" onclick="showScreen('scan-screen')">🔄 QUÉT LẠI</button>
    </div>
</div>

<script>
    // 1. Thay link của nhóm vào đây
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/qePPB6ZMw/";
    let model, webcam, maxPredictions, isScanning = false;
    let ecoData = [
        {"className": "chai_nhua", "ten": "Chai nhựa", "carbon": "CAO", "tip": "Hãy thay bằng bình inox để giảm rác thải!"},
        {"className": "binh_inox", "ten": "Bình Inox", "carbon": "THẤP", "tip": "Tuyệt vời! Hãy tiếp tục phát huy lối sống xanh."}
    ];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        isScanning = (id === 'scan-screen');
    }

    async function initAI() {
        async function initAI() {
        if (model) return;
        try {
            // Thêm dòng thông báo để kiểm tra
            console.log("Đang tải mô hình...");
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            maxPredictions = model.getTotalClasses();
            
            // Thiết lập Webcam
            const flip = true; 
            webcam = new tmImage.Webcam(300, 300, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            // Xóa nội dung cũ trong container trước khi thêm canvas mới
            const container = document.getElementById("webcam-container");
            container.innerHTML = ""; 
            container.appendChild(webcam.canvas);
            
            window.requestAnimationFrame(loop);
        } catch (e) {
            alert("Lỗi camera hoặc link model: " + e);
        }
    }
